services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  telegram-collector:
    build: .
    command: python -m telegram_collector.app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./sessions:/app/sessions
    restart: unless-stopped

  reddit-collector:
    build: .
    command: python -m reddit_collector.app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  filter-service:
    build: .
    command: python -m filter_service.app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  publisher:
    build: .
    command: python -m publisher.app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
